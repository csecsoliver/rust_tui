image: alpine/latest
packages:
    - cargo
    - hut
    - openssl-dev
    - linux-headers
secrets:
    - 672f4388-c502-4fc2-b8e8-8cc0d2d5d6e9
oauth: ""
sources:
    - https://git.sr.ht/~csoliver/rust_tui
tasks:
    - build: |
          cd rust_tui
          cargo build --release
    - upload: |
          cd rust_tui
          TAG=$(git describe --tags --exact-match)
          mv target/release/rust_tui "target/release/rust_tui-$TAG"
          hut git artifact upload "target/release/rust_tui-$TAG"
submitter:
    git.sr.ht:
        enabled: true
        allow-refs:
            - "refs/tags/*"
